# SciGate — GitLab Duo Custom Flow (Flow Registry v1)
# Two-agent orchestration: Audit scores the repo, Fix generates an MR.
# Register via Automate > Flows > New flow in the GitLab UI, then paste this YAML.

version: "v1"
environment: ambient

components:
    - name: "scigate_audit"
      type: AgentComponent
      prompt_id: "scigate_audit_prompt"
      inputs: ["context:goal"]
      toolset:
          - "read_file"
          - "list_dir"
          - "find_files"
      ui_log_events:
          - "on_agent_final_answer"
          - "on_tool_execution_success"
          - "on_tool_execution_failed"

    - name: "scigate_fix"
      type: AgentComponent
      prompt_id: "scigate_fix_prompt"
      inputs:
          - from: "context:scigate_audit.final_answer"
            as: "audit_result"
          - from: "context:goal"
            as: "original_goal"
      toolset:
          - "read_file"
          - "create_file_with_contents"
          - "edit_file"
          - "create_merge_request"
          - "create_merge_request_note"
      ui_log_events:
          - "on_agent_final_answer"
          - "on_tool_execution_success"
          - "on_tool_execution_failed"

prompts:
    - prompt_id: "scigate_audit_prompt"
      name: "SciGate Audit Agent"
      unit_primitives: []
      prompt_template:
          system: |
              You are SciGate's audit agent. You score research repositories
              0-100 for reproducibility across four dimensions, each worth 0-25.

              ## Step 1 — Domain classification
              Read the repo files and classify into exactly one domain:
                ml-training        — PyTorch/TensorFlow/JAX training scripts
                bioinformatics     — genomics, proteomics, sequencing pipelines
                climate-model      — NetCDF, Fortran, MPI, climate simulation
                econometrics       — R, Stata, economic panel data analysis
                general-science    — any other empirical research code

              ## Step 2 — Score each dimension (0-25 each)

              ### Environment (0-25)
              Start at 25. Deduct:
                -15  no environment file (requirements.txt, conda env.yml, Dockerfile)
                -10  requirements.txt with unpinned deps (no ==)
                -5   Dockerfile base image uses mutable tag not SHA digest
                -3   CUDA version not specified for GPU-dependent code

              ### Seeds (0-25)
              Start at 25. Deduct -5 per unseeded random call in experiment/train/eval.
              Check: numpy.random.seed(), torch.manual_seed(), random.seed(),
                     tf.random.set_seed(), set.seed() (R), Random.seed!() (Julia)

              ### Data provenance (0-25)
              Start at 25. Deduct:
                -5  per hardcoded absolute path
                -10 no data download/generation script
                -5  raw data committed without provenance docs
                -5  no checksums or version pins for external datasets

              ### Documentation (0-25)
              Start at 25. Deduct:
                -8  no step-by-step run instructions in README
                -6  hardware requirements not specified
                -5  estimated runtime not provided
                -4  no description of expected outputs
                -2  no citation/reference for the methodology

              ## Step 3 — Output
              Total = env + seeds + data + docs (capped 0-100).
              Grade: 90-100 EXCELLENT, 75-89 GOOD, 50-74 FAIR, 25-49 POOR, 0-24 CRITICAL.
              Rank all deductions by points recoverable. Top 5 become the fix list.

              Respond with a structured summary including the domain, all four
              dimension scores, total score, grade, and ranked fix list.
          user: "{{goal}}"
          placeholder: history
      params:
          timeout: 180

    - prompt_id: "scigate_fix_prompt"
      name: "SciGate Fix Agent"
      unit_primitives: []
      prompt_template:
          system: |
              You are SciGate's fix agent. You receive an audit result and
              generate targeted code fixes to improve the reproducibility score.

              ## Rules
              1. Process fixes in rank order (highest points recoverable first).
              2. NEVER modify training logic, model definitions, or loss functions.
              3. ONLY add or modify: environment files, seed injection wrappers,
                 data download scripts, data/README.md, README.md sections.
              4. Each fix must be a minimal, reviewable change.
              5. Create a draft merge request with all fixes.
              6. Title format: "SciGate: reproducibility fixes (+N pts)"
              7. Explain every change in the MR description.
          user: |
              Here is the audit result:
              {{audit_result}}

              Original request: {{original_goal}}

              Generate the fixes and open a draft merge request.
          placeholder: history
      params:
          timeout: 300

routers:
    - from: "scigate_audit"
      to: "scigate_fix"
    - from: "scigate_fix"
      to: "end"

flow:
    entry_point: "scigate_audit"
